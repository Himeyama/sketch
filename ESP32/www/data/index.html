<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>ESP32</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { color-scheme: light; }
  * { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-4 antialiased font-sans text-[15px]">

<main class="w-full max-w-sm rounded-lg border border-slate-200 bg-white p-6 sm:p-8 shadow-sm">
  <div class="border-b border-slate-200 pb-4">
    <h1 class="text-lg font-semibold text-slate-900">ESP32 サーバー</h1>
  </div>

  <dl id="info" class="mt-4 divide-y divide-slate-200 text-sm">
    <div class="flex items-center justify-between py-2.5">
      <dt class="text-slate-500">MAC アドレス</dt>
      <dd data-field="mac" class="truncate pl-4 font-medium text-slate-900">-</dd>
    </div>
    <div class="flex items-center justify-between py-2.5">
      <dt class="text-slate-500">電波強度</dt>
      <dd data-field="rssi" class="truncate pl-4 font-medium text-slate-900">-</dd>
    </div>
    <div class="flex items-center justify-between gap-4 py-2.5">
      <dt class="shrink-0 text-slate-500">BLE</dt>
      <dd class="flex min-w-0 items-center gap-2 font-medium text-slate-900">
        <span data-field="bleDot" class="h-2 w-2 shrink-0 rounded-full bg-slate-400"></span>
        <span data-field="ble" class="truncate">-</span>
      </dd>
    </div>
    <div class="flex items-center justify-between py-2.5">
      <dt class="text-slate-500">空きヒープ</dt>
      <dd data-field="heap" class="truncate pl-4 font-medium text-slate-900">-</dd>
    </div>
    <div class="flex items-center justify-between py-2.5">
      <dt class="text-slate-500">稼働時間</dt>
      <dd data-field="uptime" class="truncate pl-4 font-medium text-slate-900">-</dd>
    </div>
  </dl>

  <p id="error" class="mt-4 hidden text-sm text-rose-600">ステータスを取得できません</p>
</main>

<script>
const field = (name) => document.querySelector(`[data-field="${name}"]`);

function formatUptime(seconds) {
  const hours = Math.floor(seconds / 3600);
  const minutes = Math.floor((seconds % 3600) / 60);
  return `${hours}時間 ${minutes}分 ${seconds % 60}秒`;
}

async function refresh() {
  try {
    const response = await fetch("/api/status", { cache: "no-store" });
    if (!response.ok) throw new Error(response.statusText);
    const status = await response.json();

    field("mac").textContent = status.mac;
    field("rssi").textContent = `${status.rssi} dBm`;
    field("ble").textContent = status.bleConnected ? "接続中" : "未接続";
    field("bleDot").className = `h-2 w-2 shrink-0 rounded-full ${status.bleConnected ? "bg-emerald-400" : "bg-slate-400"}`;
    field("heap").textContent = `${(status.freeHeap / 1024).toFixed(1)} KB`;
    field("uptime").textContent = formatUptime(status.uptimeSeconds);
    document.getElementById("error").classList.add("hidden");
  } catch (error) {
    document.getElementById("error").classList.remove("hidden");
  }
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
